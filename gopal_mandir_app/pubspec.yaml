name: gopal_mandir_app
description: "Shri Gopal Mandir — Digital Darshan & Seva App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  google_fonts: ^8.0.0
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.4
  file_picker: ^8.0.0
  razorpay_flutter: ^1.4.0
  just_audio: ^0.9.46

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^4.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/laddu_gopal_landing.png
    - assets/images/gopal_darshan_1.jpg
    - assets/images/gopal_darshan_2.jpg
    - assets/images/gopal_darshan_3.jpg
    - assets/images/gopal_darshan_4.jpg
    - assets/images/vrindavan_bg_pattern.png
    - gopal_images/IMG_7120.JPG

